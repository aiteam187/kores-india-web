name: CI - Kores India Web Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          submodules: true

      # No deployment target configured yet for Kores India.
      # This workflow only checks out code on push — it does not build
      # or deploy to any server. Add deploy steps here once Kores India's
      # own Static Web App (or other hosting) is provisioned.
